{{- if .Values.manifestUrl }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cronix.fullname" . }}-apply
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cronix.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.applySchedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "cronix.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ default (include "cronix.fullname" .) .Values.serviceAccount.name }}
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
          - name: cronix
            image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            {{- with .Values.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            args:
              - apply
              - --manifest={{ .Values.manifestUrl }}
              - --backend=kubernetes
              - --in-cluster
              - --k8s-namespace={{ .Release.Namespace }}
              - --k8s-image={{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}
              {{- range .Values.secretRefs }}
              - --secret-ref={{ . }}
              {{- end }}
            env:
              {{- with .Values.env }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
            # readOnlyRootFilesystem requires a writable /tmp for any
            # transient files the Go runtime / TLS code paths may
            # create. emptyDir is cleaned up when the Pod exits.
            volumeMounts:
              - name: tmp
                mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
{{- end }}
