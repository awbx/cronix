version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - dist
    - examples/go-app
