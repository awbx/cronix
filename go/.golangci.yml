version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    paths:
      - dist
      - examples/go-app

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - dist
      - examples/go-app
