version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - misspell
  exclusions:
    paths:
      - dist
      - examples/go-app

formatters:
  enable:
    - gofmt
    - goimports
