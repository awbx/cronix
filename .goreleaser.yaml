version: 2

project_name: cronix

before:
  hooks:
    - sh -c "cd ./go && go mod tidy"

builds:
  - id: cronix
    dir: ./go
    main: ./cmd/cronix
    binary: cronix
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/awbx/cronix/go/internal/cli/commands.version={{.Version}}
      - -X github.com/awbx/cronix/go/internal/cli/commands.commit={{.Commit}}
      - -X github.com/awbx/cronix/go/internal/cli/commands.date={{.Date}}

archives:
  - id: cronix
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

dockers:
  - image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-amd64"
      - "docker.io/awbx/cronix:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/awbx/cronix"
      - "--label=org.opencontainers.image.version={{ .Version }}"
  - image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-arm64"
      - "docker.io/awbx/cronix:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/awbx/cronix"
      - "--label=org.opencontainers.image.version={{ .Version }}"

nfpms:
  - id: cronix
    package_name: cronix
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: cronix
    homepage: https://github.com/awbx/cronix
    maintainer: Abdelhadi Sabani <asabani.work@gmail.com>
    description: Cron jobs as code — reconciler that turns application-declared manifests into native host scheduler entries.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/cronix/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/cronix/README.md

docker_manifests:
  - name_template: "ghcr.io/awbx/cronix:{{ .Version }}"
    image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-amd64"
      - "ghcr.io/awbx/cronix:{{ .Version }}-arm64"
  - name_template: "ghcr.io/awbx/cronix:latest"
    image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-amd64"
      - "ghcr.io/awbx/cronix:{{ .Version }}-arm64"
  - name_template: "docker.io/awbx/cronix:{{ .Version }}"
    image_templates:
      - "docker.io/awbx/cronix:{{ .Version }}-amd64"
      - "docker.io/awbx/cronix:{{ .Version }}-arm64"
  - name_template: "docker.io/awbx/cronix:latest"
    image_templates:
      - "docker.io/awbx/cronix:{{ .Version }}-amd64"
      - "docker.io/awbx/cronix:{{ .Version }}-arm64"

brews:
  - name: cronix
    # Skip the brew step entirely when HOMEBREW_TAP_TOKEN isn't set,
    # so the rest of the release (binaries, packages, docker) still
    # ships even if the tap PAT hasn't been provisioned yet.
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ else }}false{{ end }}'
    repository:
      owner: awbx
      name: homebrew-cronix
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: cronix-release-bot
      email: noreply@github.com
    commit_msg_template: "cronix {{ .Tag }}"
    directory: Formula
    homepage: https://github.com/awbx/cronix
    description: Cron jobs as code — reconcile app-declared schedules against the host scheduler
    license: Apache-2.0
    install: |
      bin.install "cronix"
      generate_completions_from_executable(bin/"cronix", "completion")
    test: |
      system "#{bin}/cronix", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
