version: 2

project_name: cronix

before:
  hooks:
    - sh -c "cd ./go && go mod tidy"

builds:
  - id: cronix
    dir: ./go
    main: ./cmd/cronix
    binary: cronix
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/awbx/cronix/go/internal/cli/commands.version={{.Version}}
      - -X github.com/awbx/cronix/go/internal/cli/commands.commit={{.Commit}}
      - -X github.com/awbx/cronix/go/internal/cli/commands.date={{.Date}}

archives:
  - id: cronix
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

# Cosign keyless signing of the checksums file (D-036, issue #2).
# The OIDC identity comes from the GitHub Actions release workflow —
# `id-token: write` permission must be set in release.yml. With the
# checksum file signed, any binary that hashes to a line inside it is
# transitively attested by the same OIDC identity.
signs:
  - cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    output: true

# Cosign keyless signing of container images. Signatures are attached
# to the images in their respective registries; verification does not
# require pulling the image — see README §Verify a release.
docker_signs:
  - cmd: cosign
    artifacts: images
    args:
      - "sign"
      - "${artifact}"
      - "--yes"
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

dockers:
  - image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-amd64"
      - "docker.io/awbx/cronix:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/awbx/cronix"
      - "--label=org.opencontainers.image.version={{ .Version }}"
  - image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-arm64"
      - "docker.io/awbx/cronix:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: deploy/docker/Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/awbx/cronix"
      - "--label=org.opencontainers.image.version={{ .Version }}"

nfpms:
  - id: cronix
    package_name: cronix
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: cronix
    homepage: https://github.com/awbx/cronix
    maintainer: Abdelhadi Sabani <asabani.work@gmail.com>
    description: Cron jobs as code — reconciler that turns application-declared manifests into native host scheduler entries.
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/cronix/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/cronix/README.md

docker_manifests:
  - name_template: "ghcr.io/awbx/cronix:{{ .Version }}"
    image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-amd64"
      - "ghcr.io/awbx/cronix:{{ .Version }}-arm64"
  - name_template: "ghcr.io/awbx/cronix:latest"
    image_templates:
      - "ghcr.io/awbx/cronix:{{ .Version }}-amd64"
      - "ghcr.io/awbx/cronix:{{ .Version }}-arm64"
  - name_template: "docker.io/awbx/cronix:{{ .Version }}"
    image_templates:
      - "docker.io/awbx/cronix:{{ .Version }}-amd64"
      - "docker.io/awbx/cronix:{{ .Version }}-arm64"
  - name_template: "docker.io/awbx/cronix:latest"
    image_templates:
      - "docker.io/awbx/cronix:{{ .Version }}-amd64"
      - "docker.io/awbx/cronix:{{ .Version }}-arm64"

brews:
  - name: cronix
    # Skip the brew step entirely when HOMEBREW_TAP_TOKEN isn't set,
    # so the rest of the release (binaries, packages, docker) still
    # ships even if the tap PAT hasn't been provisioned yet.
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ else }}false{{ end }}'
    repository:
      owner: awbx
      name: homebrew-cronix
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: cronix-release-bot
      email: noreply@github.com
    commit_msg_template: "cronix {{ .Tag }}"
    directory: Formula
    homepage: https://github.com/awbx/cronix
    description: Cron jobs as code — reconcile app-declared schedules against the host scheduler
    license: Apache-2.0
    install: |
      bin.install "cronix"
      generate_completions_from_executable(bin/"cronix", "completion")
    test: |
      system "#{bin}/cronix", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  footer: |
    ## Verify this release

    Every release artifact is signed two ways: a **cosign keyless signature**
    over `checksums.txt` (Sigstore Fulcio cert + transparency log) and a
    **SLSA Build Level 3 provenance attestation** generated by
    `slsa-framework/slsa-github-generator`. Both bind the artifacts to this
    repository's GitHub Actions release workflow; both are verifiable with
    no public key to track.

    **Cosign — verify the checksum file and your binary:**

    ```sh
    cosign verify-blob \
      --certificate-identity-regexp 'https://github.com/awbx/cronix/.*' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      checksums.txt

    sha256sum -c --ignore-missing checksums.txt
    ```

    **SLSA — verify any binary directly against the provenance file:**

    ```sh
    slsa-verifier verify-artifact cronix_{{ .Version }}_linux_amd64.tar.gz \
      --provenance-path cronix-{{ .Tag }}.intoto.jsonl \
      --source-uri github.com/awbx/cronix \
      --source-tag {{ .Tag }}
    ```

    **Cosign — verify a container image:**

    ```sh
    cosign verify \
      --certificate-identity-regexp 'https://github.com/awbx/cronix/.*' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      ghcr.io/awbx/cronix:{{ .Tag }}-amd64
    ```

    **npm — every @awbx/cronix-* package has its own SLSA-shaped
    provenance**, visible on the package's npm page; tooling like
    `npm audit signatures` validates it automatically.

    See [README §Verify a release](https://github.com/awbx/cronix#verify-a-release)
    for the full verification reference.
