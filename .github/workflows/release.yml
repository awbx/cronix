name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  # OIDC token for cosign keyless signing (issue #2). The identity
  # encoded in the signing cert is the GitHub Actions workflow URL;
  # verifiers match it via --certificate-identity-regexp.
  id-token: write

# Opt every JS-based action into Node 24 ahead of GitHub's June 2026
# default flip — silences the Node-20-deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Hashes of every release artifact, base64-encoded, exposed as a job
    # output so the SLSA provenance generator job can consume them as
    # subjects. checksums.txt is GoReleaser's canonical list and is in
    # the exact <hex-sha256>  <filename> format the generator expects.
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go/go.sum
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: awbx
          password: ${{ secrets.GHCR_PAT }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with public_repo scope on awbx/homebrew-cronix.
          # When unset, goreleaser still produces the formula locally
          # but skips uploading — see brews.skip_upload in .goreleaser.yaml.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Generate artifact hashes for SLSA provenance
        id: hash
        working-directory: dist
        run: |
          # GoReleaser's checksums.txt is already <sha256>  <filename> per
          # line — exactly the format slsa-github-generator wants. Base64
          # the whole file and hand it off as the subject set.
          HASHES=$(base64 -w0 checksums.txt)
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

  provenance:
    needs: [goreleaser]
    permissions:
      actions: read     # read workflow metadata to embed in provenance
      id-token: write   # OIDC for Sigstore Fulcio signing
      contents: write   # upload the .intoto.jsonl as a release asset
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      upload-assets: true
      provenance-name: cronix-${{ github.ref_name }}.intoto.jsonl

  verify-provenance:
    name: Verify SLSA provenance
    needs: [provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@v2.6.0
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p verify-dist
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir verify-dist
      - name: Verify provenance against every binary
        working-directory: verify-dist
        run: |
          set -euo pipefail
          PROVENANCE="cronix-${GITHUB_REF_NAME}.intoto.jsonl"
          if [ ! -f "$PROVENANCE" ]; then
            echo "::error::expected provenance file $PROVENANCE missing from release assets"
            exit 1
          fi
          # checksums.txt is the SOURCE of the provenance subject set
          # (we base64'd it and handed it to the generator). It is not
          # itself a subject of the provenance — a file can't be in its
          # own checksum list. Cosign signs checksums.txt; SLSA covers
          # the binaries that checksums.txt enumerates. Do not add
          # checksums.txt to this loop.
          shopt -s nullglob
          verified=0
          for f in cronix_*.tar.gz cronix_*.zip cronix_*.deb cronix_*.rpm cronix_*.apk; do
            echo "::group::verify $f"
            slsa-verifier verify-artifact "$f" \
              --provenance-path "$PROVENANCE" \
              --source-uri "github.com/${GITHUB_REPOSITORY}" \
              --source-tag "${GITHUB_REF_NAME}"
            verified=$((verified + 1))
            echo "::endgroup::"
          done
          if [ "$verified" -eq 0 ]; then
            echo "::error::no artifacts matched the expected name patterns; provenance was never exercised"
            exit 1
          fi
          echo "::notice::verified SLSA provenance against $verified artifact(s)"

  npm:
    name: Publish TS packages to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
      - name: Install
        working-directory: ts
        run: pnpm install --frozen-lockfile
      - name: Set version on all packages from tag
        working-directory: ts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing all @awbx/cronix-* packages at ${VERSION}"
          for dir in packages/sdk packages/adapter-express packages/adapter-fastify packages/adapter-koa packages/adapter-nest; do
            (cd "$dir" && pnpm version "${VERSION}" --no-git-tag-version --allow-same-version --workspaces-update=false)
          done
      - name: Build all packages
        working-directory: ts
        run: pnpm build
      - name: Publish in dependency order
        working-directory: ts
        run: |
          # sdk first (no internal deps), then framework adapters, then nest (depends on adapter-express).
          # --provenance attaches an npm-native SLSA-shaped attestation bound
          # to this workflow's OIDC identity. The top-level permissions block
          # already grants id-token: write, which is what npm needs.
          for dir in packages/sdk packages/adapter-express packages/adapter-fastify packages/adapter-koa packages/adapter-nest; do
            echo "::group::publish $dir"
            (cd "$dir" && pnpm publish --provenance --access public --no-git-checks)
            echo "::endgroup::"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
