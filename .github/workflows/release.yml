name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go/go.sum
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: awbx
          password: ${{ secrets.GHCR_PAT }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: Publish TS packages to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
      - name: Install
        working-directory: ts
        run: pnpm install --frozen-lockfile
      - name: Set version on all packages from tag
        working-directory: ts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing all @awbx/cronix-* packages at ${VERSION}"
          for dir in packages/sdk packages/adapter-express packages/adapter-fastify packages/adapter-koa packages/adapter-nest; do
            (cd "$dir" && pnpm version "${VERSION}" --no-git-tag-version --allow-same-version --workspaces-update=false)
          done
      - name: Build all packages
        working-directory: ts
        run: pnpm build
      - name: Publish in dependency order
        working-directory: ts
        run: |
          # sdk first (no internal deps), then framework adapters, then nest (depends on adapter-express).
          for dir in packages/sdk packages/adapter-express packages/adapter-fastify packages/adapter-koa packages/adapter-nest; do
            echo "::group::publish $dir"
            (cd "$dir" && pnpm publish --access public --no-git-checks)
            echo "::endgroup::"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
