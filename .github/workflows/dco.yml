name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while read -r sha; do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer."
              echo "  Fix with: git commit --amend -s   (and force-push)"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing commit(s) missing DCO sign-off. See https://developercertificate.org/."
            exit 1
          fi
          echo "All commits carry a Signed-off-by trailer."
