name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/deploy-docs.yml"

# Cancel an in-progress run when a new commit lands on the same ref
# (PR head, feature branch, or main). Saves runner minutes when pushes
# come back-to-back — common during rebase / amend / fix-the-build loops.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS-based action into Node 24 ahead of GitHub's June 2026
# default flip — silences the Node-20-deprecation warning without waiting
# for every action vendor to publish a v5/v6 with a new runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: HMAC compare-only-constant-time check (TS)
        working-directory: .
        run: |
          if grep -RnE '(===|!==).*(hmac|signature|sig|mac)' ts/packages/sdk/src \
             | grep -v constantTimeEqual \
             | grep -v '\.test\.ts'; then
            echo "::error::found loose comparison adjacent to hmac/signature in @awbx/cronix-sdk; use constantTimeEqual"
            exit 1
          fi

  bun:
    name: TypeScript on Bun
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @awbx/cronix-sdk run build
      - name: Run conformance suites under Bun
        run: bun test packages/sdk/test

  schema-drift:
    name: Schema drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ts/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
      - name: Install
        working-directory: ts
        run: pnpm install --frozen-lockfile
      - name: Regenerate manifest.schema.json
        working-directory: ts
        run: pnpm gen:schema
      - name: Regenerate auth-vectors.json
        working-directory: ts
        run: pnpm gen:auth-vectors
      - name: Verify no drift
        run: |
          git diff --exit-code spec/manifest.schema.json spec/auth-vectors.json || \
            (echo "spec/manifest.schema.json or spec/auth-vectors.json is out of date — run 'pnpm gen:schema' and 'pnpm gen:auth-vectors' from ts/" && exit 1)

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go/go.sum
      - run: go vet ./...
      - run: go test ./...
      - name: HMAC compare-only-constant-time check (Go)
        working-directory: .
        run: |
          if grep -RnE 'bytes\.Equal\(.*(hmac|signature|sig|mac).*\)' go \
             | grep -v '_test\.go'; then
            echo "::error::found bytes.Equal on hmac/signature in Go sources; use crypto/subtle.ConstantTimeCompare"
            exit 1
          fi
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: go

  goreleaser-snapshot:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: go/go.sum
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --snapshot --clean
